services:
  - type: web
    name: vip-dl
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install "yt-dlp==2026.5.3" --force-reinstall --quiet
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
