name: Build Family Safety APK

on:
  push:
    branches: ["claude/family-protection-app-3XkD9", "main"]
    paths: ["family-safety/android/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Build Debug APK
        working-directory: family-safety/android
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: FamilySafety-debug
          path: family-safety/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
