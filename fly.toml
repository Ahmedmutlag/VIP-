# fly.toml app configuration file generated for vip-dl on 2026-06-12T22:00:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vip-dl'
primary_region = 'fra'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
